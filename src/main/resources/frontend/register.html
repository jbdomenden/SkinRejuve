<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinRejuve Registration</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-bg">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand" data-skin-rejuve-logo data-logo-size="large" data-logo-subtitle="SINCE 2011"></div>

      <section class="panel page-panel">
        <div class="page-kicker">NEW CLIENT</div>
        <h1 class="page-title">Create your account</h1>
        <p class="page-copy">Register once to manage consultations, appointments, and treatment updates.</p>

        <label>EMAIL</label>
        <input id="registerEmail" placeholder="new@client.com" />
        <label>PASSWORD</label>
        <input id="registerPassword" type="password" placeholder="at least 8 chars" />
        <button class="cta" id="registerBtn">CREATE ACCOUNT</button>
        <pre id="registerMsg"></pre>

        <p class="page-link-row">Already registered? <a href="login.html">Go to login</a></p>
      </section>
    </section>
  </main>

  <script src="logo.js"></script>
  <script src="api-client.js"></script>
  <script src="register.js"></script>
</body>
</html>
