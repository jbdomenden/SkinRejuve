<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Rejuve | Patient Services</title>
  <link rel="stylesheet" href="/frontend/dashboard/css/dashboard.css" />
</head>
<body class="portal-bg" data-page="services" data-patient-page="appointment">
  <div class="patient-layout">
        <aside class="patient-sidebar app-sidebar" data-sidebar-root></aside>

    <main class="patient-main responsive-container" data-sidebar-content>
      <header class="page-header surface-panel">
        <p class="page-eyebrow">Patient Portal</p>
        <h1>Explore our treatment services</h1>
        <p class="page-subtitle">Select a treatment category to view details and continue your booking.</p>
      </header>

      <section class="surface-panel services-panel" aria-labelledby="servicesTitle">
        <div class="panel-heading">
          <div>
            <h2 id="servicesTitle">Treatment Categories</h2>
            <p>Choose a service that fits your skin care needs.</p>
          </div>
          <a class="btn btn-secondary" href="/frontend/dashboard/html/dashboard.html">Back to Dashboard</a>
        </div>

        <div id="servicesState" class="state-banner" aria-live="polite">Loading services…</div>
        <div class="services-grid" id="servicesGrid" hidden></div>
      </section>

      <p class="services-help">Select a treatment to continue with your appointment request.</p>
    </main>
  </div>

  <script src="/frontend/shared/js/logo.js"></script>
  <script src="/frontend/shared/js/api-client.js"></script>
  <script>window.skinRejuveAuthGuard = { requireAuth: true, redirectTo: '/frontend/landing/html/index.html?auth=login' };</script>
  <script src="/frontend/shared/js/auth-guard.js"></script>
  <script src="/frontend/shared/js/sidebar.js"></script>
  <script src="/frontend/dashboard/js/dashboard.js"></script>
</body>
</html>
