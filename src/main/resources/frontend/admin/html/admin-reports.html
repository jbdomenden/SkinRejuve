<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinRejuve Reports</title>
  <link rel="stylesheet" href="/frontend/admin/css/admin-reports.css" />
</head>
<body class="admin-bg" data-admin-page="reports">
  <main class="admin-shell modern-shell">
    <aside class="admin-sidebar app-sidebar" data-sidebar-root></aside>
    <section class="admin-content admin-page-grid" data-sidebar-content>
      <section class="hero-strip compact-hero">
        <div>
          <div class="page-kicker">REPORTS</div>
          <h1 class="page-title page-title-dark">Performance overview</h1>
          <p class="page-copy page-copy-dark">Use backend-powered reporting cards to see volume, revenue, and service-level traction.</p>
        </div>
      </section>
      <section id="reportMetrics" class="metric-grid"></section>
      <section class="admin-card wide-card">
        <div class="section-header">
          <div>
            <h2>Status mix</h2>
            <p class="section-copy">Quick count of the operational appointment pipeline.</p>
          </div>
        </div>
        <div id="statusMetrics"></div>
      </section>
      <section class="admin-card wide-card">
        <div class="section-header">
          <div>
            <h2>Service performance</h2>
            <p class="section-copy">Compare bookings and completed revenue by treatment offering.</p>
          </div>
        </div>
        <div id="servicePerformance"></div>
      </section>
    </section>
  </main>
  <script src="/frontend/shared/js/logo.js"></script>
  <script src="/frontend/shared/js/api-client.js"></script>
  <script>window.skinRejuveAuthGuard = { requireAuth: true, roles: ['ADMIN', 'STAFF'], redirectTo: '/frontend/landing/html/index.html?auth=login', unauthorizedRedirect: '/frontend/dashboard/html/dashboard.html' };</script>
  <script src="/frontend/shared/js/auth-guard.js"></script>
  <script src="/frontend/shared/js/sidebar.js"></script>
  <script src="/frontend/shared/js/admin-shell.js"></script>
  <script src="/frontend/admin/js/admin-reports.js"></script>
</body>
</html>
