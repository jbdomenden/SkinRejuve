<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinRejuve Review Queue</title>
  <link rel="stylesheet" href="/frontend/admin/css/admin-review.css" />
</head>
<body class="admin-bg" data-admin-page="review">
  <main class="admin-shell modern-shell">
    <aside class="admin-sidebar glass-sidebar">
      <div class="brand" data-skin-rejuve-logo data-logo-size="compact" data-logo-subtitle="SINCE 2011"></div>
      <nav>
        <a href="/frontend/admin/html/admin-dashboard.html" data-admin-nav="dashboard">Dashboard</a>
        <a href="/frontend/admin/html/admin-appointments.html" data-admin-nav="appointments">Appointments</a>
        <a href="/frontend/admin/html/admin-registration.html" data-admin-nav="registration">Registration</a>
        <a href="/frontend/admin/html/admin-review.html" data-admin-nav="review">Review</a>
        <a href="/frontend/admin/html/admin-reports.html" data-admin-nav="reports">Reports</a>
        <a href="/frontend/admin/html/admin-landing.html" data-admin-nav="landing">Landing Page</a>
      </nav>
      <button class="secondary-btn admin-logout" id="adminLogoutBtn" type="button">LOG OUT</button>
    </aside>

    <section class="admin-content admin-page-grid">
      <section class="hero-strip compact-hero dashboard-hero">
        <div>
          <div class="page-kicker">REVIEW</div>
          <h1 class="page-title page-title-dark">Review Queue</h1>
          <p class="page-copy page-copy-dark">Approve or deny appointment requests.</p>
        </div>
      </section>
      <section id="reviewHighlights" class="metric-grid"></section>
      <section class="admin-card wide-card split-card admin-surface-card">
        <div>
          <div class="section-header compact-section-header">
            <div>
              <h2>Requests</h2>
              <p class="section-copy">Select a request to review.</p>
            </div>
          </div>
          <div id="reviewAppointments"></div>
        </div>
        <div class="review-form review-form-card">
          <label>Appointment ID</label>
          <input id="appointmentId" placeholder="apt-..." />

          <label>Status</label>
          <select id="status">
            <option>PENDING</option>
            <option>APPROVED</option>
            <option>DENIED</option>
            <option>CHECKED_IN</option>
            <option>IN_PROGRESS</option>
            <option>COMPLETED</option>
            <option>CANCELLED</option>
            <option>NO_SHOW</option>
          </select>

          <label>Denial Reason</label>
          <input id="denialReason" placeholder="Reason" />

          <button id="updateBtn">UPDATE STATUS</button>
          <pre id="adminMsg"></pre>
        </div>
      </section>
    </section>
  </main>

  <script src="/frontend/shared/js/logo.js"></script>
  <script src="/frontend/shared/js/api-client.js"></script>
  <script>window.skinRejuveAuthGuard = { requireAuth: true, roles: ['ADMIN', 'STAFF'], redirectTo: '/frontend/landing/html/index.html?auth=login', unauthorizedRedirect: '/frontend/dashboard/html/dashboard.html' };</script>
  <script src="/frontend/shared/js/auth-guard.js"></script>
  <script src="/frontend/shared/js/admin-shell.js"></script>
  <script src="/frontend/admin/js/admin-review.js"></script>
</body>
</html>
