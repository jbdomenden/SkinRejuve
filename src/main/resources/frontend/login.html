<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinRejuve Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="portal-bg">
  <main class="portal-shell">
    <section class="portal-card auth-card">
      <div class="brand portal-brand" data-skin-rejuve-logo data-logo-size="large" data-logo-subtitle="SINCE 2011"></div>

      <div class="auth-tabs portal-tabs" role="tablist" aria-label="Authentication views">
        <a class="tab tab-active" href="login.html" aria-current="page">SIGN IN</a>
        <a class="tab" href="register.html">NEW CLIENT</a>
      </div>

      <section class="portal-panel">
        <form id="loginForm" class="portal-form" novalidate>
          <label for="email">USERNAME</label>
          <input id="email" name="email" type="email" autocomplete="username" placeholder="email@example.com" required />

          <label for="password">PASSWORD</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />

          <div class="portal-utility-row">
            <label class="remember-row portal-remember"><input type="checkbox" id="rememberMe" checked />Remember me on this device</label>
            <button class="link-button" id="forgotPasswordBtn" type="button">FORGOT PASSWORD?</button>
          </div>

          <button class="cta portal-cta" id="loginBtn" type="submit">ENTER PORTAL</button>
          <p class="portal-helper">Demo patient login: <strong>patient@skinrejuve.local</strong> / <strong>Patient123!</strong></p>
          <p class="form-feedback" id="authMsg" role="status" aria-live="polite"></p>
        </form>
      </section>
    </section>
  </main>

  <script src="logo.js"></script>
  <script src="api-client.js"></script>
  <script src="login.js"></script>
</body>
</html>
