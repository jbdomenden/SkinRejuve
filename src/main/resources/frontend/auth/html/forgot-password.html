<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Rejuve | Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/frontend/auth/css/login.css" />
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-card auth-card-narrow" aria-labelledby="forgotTitle">
      <header class="auth-header">
        <span data-skin-rejuve-logo data-logo-size="compact" data-logo-subtitle="since 2011"></span>
      </header>

      <h1 id="forgotTitle" class="auth-section-title">Forgot Password</h1>
      <p class="auth-copy">Enter your registered email to receive a reset link.</p>

      <form id="forgotPasswordForm" class="form-grid" novalidate>
        <div>
          <label class="field-label" for="forgotEmail">Email Address</label>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope" aria-hidden="true"></i>
            <input id="forgotEmail" name="email" type="email" placeholder="Enter your email" required autocomplete="email" />
          </div>
        </div>

        <button class="auth-btn auth-btn-primary" type="submit">Send Reset Link</button>
        <a class="auth-link" href="/frontend/auth/html/login.html">Return to Sign In</a>
        <p class="auth-message" id="forgotMsg" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="/frontend/shared/js/logo.js"></script>
  <script src="/frontend/shared/js/api-client.js"></script>
  <script src="/frontend/auth/js/login.js"></script>
</body>
</html>
