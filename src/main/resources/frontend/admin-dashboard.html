<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinRejuve Admin Dashboard</title>
  <link rel="stylesheet" href="admin-dashboard.css" />
</head>
<body class="admin-bg" data-admin-page="dashboard">
  <main class="admin-shell modern-shell">
    <aside class="admin-sidebar glass-sidebar"></aside>

    <section class="admin-content admin-page-grid dashboard-reference-layout">
      <section class="hero-strip dashboard-reference-hero">
        <div>
          <div class="page-kicker">ADMIN DASHBOARD</div>
          <h1 class="page-title page-title-dark dashboard-reference-title">Admin Dashboard</h1>
        </div>
      </section>

      <section id="metricsGrid" class="metric-grid dashboard-reference-metrics"></section>

      <section class="admin-card wide-card admin-surface-card dashboard-management-card">
        <div class="dashboard-management-toolbar">
          <div>
            <h2>User Management</h2>
          </div>
          <div class="dashboard-toolbar-actions">
            <label class="dashboard-search-field" aria-label="Search users">
              <span>⌕</span>
              <input id="dashboardSearchInput" type="search" placeholder="Search users" />
            </label>
            <button class="secondary-btn dashboard-filter-btn" id="dashboardFilterBtn" type="button">Filter</button>
            <button class="dashboard-add-btn" id="dashboardAddUserBtn" type="button">+ Add User</button>
          </div>
        </div>
        <div id="dashboardUserTable"></div>
      </section>
    </section>
  </main>

  <script src="logo.js"></script>
  <script src="api-client.js"></script>
  <script>window.skinRejuveAuthGuard = { requireAuth: true, roles: ['ADMIN', 'STAFF'], redirectTo: 'index.html?auth=login', unauthorizedRedirect: 'dashboard.html' };</script>
  <script src="auth-guard.js"></script>
  <script src="admin-shell.js"></script>
  <script src="admin-dashboard.js"></script>
</body>
</html>
