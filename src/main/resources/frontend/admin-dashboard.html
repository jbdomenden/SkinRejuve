<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinRejuve Admin Dashboard</title>
  <link rel="stylesheet" href="admin-dashboard.css" />
</head>
<body class="admin-bg" data-admin-page="dashboard">
  <main class="admin-shell modern-shell">
    <aside class="admin-sidebar glass-sidebar">
      <div class="brand" data-skin-rejuve-logo data-logo-size="compact" data-logo-subtitle="SINCE 2011"></div>
      <nav>
        <a href="admin-dashboard.html" data-admin-nav="dashboard">Dashboard</a>
        <a href="admin-appointments.html" data-admin-nav="appointments">Appointments</a>
        <a href="admin-registration.html" data-admin-nav="registration">Registration</a>
        <a href="admin-review.html" data-admin-nav="review">Review</a>
        <a href="admin-reports.html" data-admin-nav="reports">Reports</a>
        <a href="admin-landing.html" data-admin-nav="landing">Landing Page</a>
      </nav>
      <button class="secondary-btn admin-logout" id="adminLogoutBtn" type="button">LOG OUT</button>
    </aside>

    <section class="admin-content admin-page-grid">
      <section class="hero-strip dashboard-hero">
        <div>
          <div class="page-kicker">ADMIN DASHBOARD</div>
          <h1 class="page-title page-title-dark">Admin Dashboard</h1>
          <p class="page-copy page-copy-dark">Users, appointments, and clinic activity.</p>
        </div>
      </section>
      <section id="metricsGrid" class="metric-grid"></section>
      <section class="admin-card wide-card admin-surface-card">
        <div class="section-header">
          <div>
            <h2>Recent Appointments</h2>
            <p class="section-copy">Latest booked visits.</p>
          </div>
        </div>
        <div id="recentAppointments"></div>
      </section>
      <section class="admin-card wide-card admin-surface-card">
        <div class="section-header">
          <div>
            <h2>Schedule Overview</h2>
            <p class="section-copy">Status counts and upcoming visits.</p>
          </div>
        </div>
        <div id="slotCapacity"></div>
      </section>
    </section>
  </main>

  <script src="logo.js"></script>
  <script src="api-client.js"></script>
  <script>window.skinRejuveAuthGuard = { requireAuth: true, roles: ['ADMIN', 'STAFF'], redirectTo: 'index.html?auth=login', unauthorizedRedirect: 'dashboard.html' };</script>
  <script src="auth-guard.js"></script>
  <script src="admin-shell.js"></script>
  <script src="admin-dashboard.js"></script>
</body>
</html>
