ktor:
  deployment:
    port: 8060
  application:
    modules:
      - zeroday.skinrejuve.ApplicationKt.module

app:
  url: "http://localhost:8080"
  environment: "development"

jwt:
  issuer: "skinrejuve-api"
  audience: "skinrejuve-clients"
  secret: ""
  expiresMinutes: "120"

tokens:
  expiresMinutes: "30"

cors:
  allowedOrigins: "http://localhost:5173"

database:
  jdbcUrl: "jdbc:postgresql://localhost:5432/skinrejuve_db"
  username: "postgres"
  password: "root"
  driver: "org.postgresql.Driver"
  maxPoolSize: "10"

smtp:
  host: "localhost"
  port: "1025"
  username: ""
  password: ""
  from: "no-reply@skinrejuve.local"
  useTls: "false"
