ktor:
  deployment:
    port: ${PORT:8060}
  application:
    modules:
      - zeroday.skinrejuve.ApplicationKt.module

app:
  url: ${APP_URL:http://localhost:8060}
  environment: ${APP_ENV:development}

jwt:
  issuer: "skinrejuve-api"
  audience: "skinrejuve-clients"
  secret: ${JWT_SECRET:dev-secret}
  expiresMinutes: "120"

tokens:
  expiresMinutes: "30"

cors:
  allowedOrigins: ${CORS_ORIGINS:http://localhost:5173}

database:
  jdbcUrl: ${DB_URL:jdbc:postgresql://localhost:5432/skinrejuve_db}
  username: ${DB_USER:postgres}
  password: ${DB_PASSWORD:root}
  driver: "org.postgresql.Driver"
  maxPoolSize: ${DB_POOL_SIZE:5}

smtp:
  host: ${SMTP_HOST:smtp.gmail.com}
  port: ${SMTP_PORT:587}
  username: ${SMTP_USER:}
  password: ${SMTP_PASSWORD:}
  from: ${SMTP_FROM:no-reply@skinrejuve.local}
  useTls: ${SMTP_TLS:true}

bootstrapAdmin:
  email: ${ADMIN_EMAIL:superadmin@skinrejuve.local}
  password: ${ADMIN_PASSWORD:SuperAdmin123!}

bootstrapPatient:
  email: "patient@skinrejuve.local"
  password: "Patient123!"
