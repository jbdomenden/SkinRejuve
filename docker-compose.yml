version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: skinrejuve-postgres
    environment:
      POSTGRES_DB: skinrejuve
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skinrejuve"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: skinrejuve-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
