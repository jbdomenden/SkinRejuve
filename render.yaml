databases:
  - name: skinrejuve-db
    plan: free

services:
  - type: web
    name: skinrejuve
    plan: free
    runtime: java
    rootDir: .
    buildCommand: ./gradlew buildFatJar
    startCommand: java -jar build/libs/SkinRejuve-all.jar
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skinrejuve-db
          property: connectionString
      - key: DB_MAX_POOL_SIZE
        value: 5
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TLS
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
